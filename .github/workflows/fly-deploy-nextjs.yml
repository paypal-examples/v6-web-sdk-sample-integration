name: Fly Deploy Next.js

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Next.js app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/prebuiltPages/nextjs
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Set runtime secrets on Fly.io (available to the running app)
      - name: Set Fly.io runtime secrets
        run: >-
          flyctl secrets set
          PAYPAL_SANDBOX_CLIENT_ID=${{ secrets.PAYPAL_SANDBOX_CLIENT_ID }}
          PAYPAL_SANDBOX_CLIENT_SECRET=${{ secrets.PAYPAL_SANDBOX_CLIENT_SECRET }}
          --stage
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Deploy with build secrets (available during docker build only, not baked into image)
      - name: Deploy to Fly.io
        run: >-
          flyctl deploy --remote-only
          --build-secret PAYPAL_SANDBOX_CLIENT_ID=${{ secrets.PAYPAL_SANDBOX_CLIENT_ID }}
          --build-secret PAYPAL_SANDBOX_CLIENT_SECRET=${{ secrets.PAYPAL_SANDBOX_CLIENT_SECRET }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
