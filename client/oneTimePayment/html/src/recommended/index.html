<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>One-Time Payment - Recommended Integration - PayPal Web SDK</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      .buttons-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
    </style>
  </head>
  <body>
    <h1>One-Time Payment Recommended Integration</h1>

    <div class="buttons-container">
      <paypal-button id="paypal-button" type="pay" hidden></paypal-button>
      <paypal-pay-later-button id="paypal-pay-later-button" type="pay" hidden></paypal-pay-later-button>
      <venmo-button id="venmo-button" type="pay" hidden></venmo-button>
    </div>
    <script src="app.js"></script>

    <script src="https://www.sandbox.paypal.com/web-sdk/v6.16.1/paypal-payments?debug=true"></script>
    <script src="https://www.sandbox.paypal.com/web-sdk/v6.16.1/venmo-payments?debug=true"></script>
    <script
      src="https://www.sandbox.paypal.com/web-sdk/v6.16.1/core?debug=true"
      onload="onPayPalLoaded()"
    ></script>
  </body>
</html>
