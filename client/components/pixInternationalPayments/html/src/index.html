<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pix International - PayPal Web SDK</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/client/shared/styles.css" />
    <style>
      .payment-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      #pix-international-full-name,
      #pix-international-email {
        max-width: 400px;
        height: 80px;
      }

      .tax-container {
        max-width: 400px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .tax-label {
        font-family: Verdana, sans-serif;
        font-size: 14px;
        color: #333333;
        font-weight: 500;
      }

      .tax-input,
      .tax-select {
        width: 100%;
        height: 48px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        padding: 0 12px;
        font-family: Verdana, sans-serif;
        font-size: 14px;
        box-sizing: border-box;
        background: #fff;
      }

      .tax-input:focus,
      .tax-select:focus {
        outline: none;
        border-color: #0070ba;
      }

      pix-international-button {
        max-width: 225px;
      }

      .message {
        padding: 15px;
        border-radius: 4px;
        margin-top: 20px;
        display: none;
        max-width: 700px;
      }

      .message.success {
        background-color: #d4edda;
        border: 1px solid #c3e6cb;
        color: #155724;
      }

      .message.error {
        background-color: #f8d7da;
        border: 1px solid #f5c6cb;
        color: #721c24;
      }

      .message.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <h1>Pix International One-Time Payment Integration</h1>

    <div class="payment-container">
      <div id="pix-international-full-name"></div>
      <div id="pix-international-email"></div>
      <div id="tax-fields" class="tax-container" hidden>
        <label class="tax-label" for="tax-id-type">Tax ID Type:</label>
        <select id="tax-id-type" class="tax-select">
          <option value="">Select Tax ID Type</option>
          <option value="BR_CPF">BR_CPF (Individual)</option>
          <option value="BR_CNPJ">BR_CNPJ (Business)</option>
        </select>
        <label class="tax-label" for="tax-id">Tax ID:</label>
        <input
          type="text"
          id="tax-id"
          class="tax-input"
          placeholder="Enter Tax ID"
        />
      </div>
      <pix-international-button
        id="pix-international-button"
        hidden
      ></pix-international-button>
    </div>

    <div id="message" class="message"></div>

    <script
      async
      src="https://www.sandbox.paypal.com/web-sdk/v6/core"
      onload="onPayPalWebSdkLoaded()"
    ></script>
    <script src="app.js"></script>
  </body>
</html>
