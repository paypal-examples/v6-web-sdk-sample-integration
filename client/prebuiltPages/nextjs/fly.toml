app = 'v6-nextjs-sample-integration-test'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  HOSTNAME = '0.0.0.0'
  PORT = '3000'
  NEXT_TELEMETRY_DISABLED = '1'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  interval = 10000
  grace_period = "10s"
  method = "GET"
  path = "/"
  protocol = "http"
  timeout = 2000

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
